name: Deploy

# workflow_dispatch = boton manual en la pestana Actions de GitHub.
# A proposito NO se dispara con cada push a main: con el patron de
# infraestructura efimera, cada apply cuesta (aunque sea centavos) y
# corre NAT Gateway + Fargate. Vos decidis cuando encender el demo.
on:
  workflow_dispatch:
    inputs:
      task_cpu:
        description: "vCPU del task Fargate (unidades AWS: 256 = 0.25 vCPU)"
        default: "256"
      task_memory:
        description: "Memoria del task en MB"
        default: "512"

permissions:
  id-token: write # requerido por OIDC: sin esto GitHub no puede pedir el token
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rag-api-cloud
  TF_DIR: infra/environments/demo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      # OIDC: GitHub le pide a AWS un token de corta duracion usando
      # el rol configurado en secrets.AWS_ROLE_ARN. No hay ninguna
      # access key guardada en ningun lado.
      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # La action intenta por defecto agregar tags a la sesión
          # (sts:TagSession), permiso que nuestro trust policy no
          # otorga. Sin este flag, TODO el AssumeRoleWithWebIdentity
          # falla con "Not authorized", no solo el tagging.
          role-skip-session-tagging: true

      - name: Login a Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # El repo de ECR lo crea Terraform (modulo ecs), pero
      # terraform-apply corre DESPUES de este job en el pipeline.
      # Sin este paso, el docker push de mas abajo falla porque el
      # repositorio todavia no existe la primera vez que se corre.
      - name: Asegurar que el repositorio ECR existe
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION" --image-scanning-configuration scanOnPush=true

      - name: Build y push de la imagen
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  terraform-apply:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      # El repo ECR pudo haber sido creado por CLI en build-and-push
      # (primera corrida). Si Terraform todavia no lo tiene en su
      # estado, lo importamos para que "apply" no intente crearlo de
      # nuevo y falle con "ya existe". Si ya esta importado, el
      # comando falla inofensivamente y seguimos (|| true).
      #
      # -input=false es obligatorio aca: sin esto, Terraform intenta
      # preguntar interactivamente por variables sin resolver (como
      # container_image) y se queda colgado esperando un input que
      # en CI nunca llega -- exactamente lo que paso la primera vez.
      - name: Importar ECR al estado de Terraform si hace falta
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform import -input=false \
            -var="container_image=${{ needs.build-and-push.outputs.image_uri }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            module.ecs.aws_ecr_repository.app "$ECR_REPOSITORY" || true

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -input=false -auto-approve \
            -var="container_image=${{ needs.build-and-push.outputs.image_uri }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="task_cpu=${{ inputs.task_cpu }}" \
            -var="task_memory=${{ inputs.task_memory }}"

      - name: Mostrar URL del demo
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "### Demo desplegado" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: $(terraform output -raw demo_url)" >> "$GITHUB_STEP_SUMMARY"